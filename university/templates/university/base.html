<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>University Timetable</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            margin: 20px;
            color: #333;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            box-shadow: 0px 3px 10px rgba(0,0,0,0.1);
            background: white;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background: #3498db;
            color: white;
        }
        tr:nth-child(even) {
            background: #f2f2f2;
        }
        tr:hover {
            background: #d6eaf8;
        }
        nav ul {
            list-style-type: none;
            padding: 0;
            text-align: center;
            margin-bottom: 20px;
        }
        nav ul li {
            display: inline;
            margin-right: 15px;
        }
    </style>
</head>

<body>
   <header>
       <h1>University Timetable</h1>
       <nav>
           <ul>
               <li><a href="{% url 'monday' %}">Monday</a></li>
               <li><a href="{% url 'tuesday' %}">Tuesday</a></li>
               <li><a href="{% url 'wednesday' %}">Wednesday</a></li>
           </ul>
       </nav>
   </header>
    {% block content %}
    {% endblock %}
</body>
</html>
